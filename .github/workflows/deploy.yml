# Auto-deploy on every push to main (or manually from the Actions tab):
#   1. API   → Cloudflare Worker  (needs secret  CLOUDFLARE_API_TOKEN)
#   2. Front → Hostinger via FTPS (needs secrets FTP_HOST / FTP_USERNAME / FTP_PASSWORD,
#              plus repo VARIABLE VITE_API_BASE = the Worker's URL)
#
# Each half quietly skips while its secrets aren't configured yet, so this
# workflow is safe to merge before the accounts are set up. Add the secrets in
# GitHub → repo → Settings → Secrets and variables → Actions.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  api:
    name: Deploy API (Cloudflare Worker)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: env.CLOUDFLARE_API_TOKEN != ''
        with:
          node-version: 20
          cache: npm
      - if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm ci
      - name: wrangler deploy
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: 'curl -sS -X PUT https://api.cloudflare.com/client/v4/accounts/91c0b006028d85054d2c432c86b63fa3/workers/subdomain --oauth2-bearer $CLOUDFLARE_API_TOKEN -H Content-Type:application/json --data {\"subdomain\":\"growth-atlas-nik\"} || true; npx wrangler deploy'
      - name: Skipped (no CLOUDFLARE_API_TOKEN secret)
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "Add the CLOUDFLARE_API_TOKEN repo secret to enable API deploys."

  frontend:
    name: Deploy frontend (Hostinger FTP)
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: env.FTP_HOST != ''
        with:
          node-version: 20
          cache: npm
      - if: env.FTP_HOST != ''
        run: npm ci
      - name: Build (pointed at the Worker API)
        if: env.FTP_HOST != ''
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      - name: Upload dist/ to Hostinger
        if: env.FTP_HOST != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || 'public_html/' }}
      - name: Skipped (no FTP secrets)
        if: env.FTP_HOST == ''
        run: echo "Add FTP_HOST / FTP_USERNAME / FTP_PASSWORD repo secrets to enable Hostinger deploys."
